<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl Heritage Travels - Social Publisher</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .admin-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border);
        }
        h2 { margin-top: 0; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-light); font-size: 0.875rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        .status-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }
        .status-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
        .status-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Publish New Tour Package</h2>
        <p class="subtitle">Submitting this form triggers the n8n AI workflow.</p>

        <form id="tourForm">
            <div class="form-group">
                <label for="tourTitle">Tour Title</label>
                <input type="text" id="tourTitle" name="tourTitle" required placeholder="e.g., 7-Day Cultural Triangle Explorer">
            </div>

            <div class="form-group">
                <label for="description">Package Description</label>
                <textarea id="description" name="description" rows="4" required placeholder="Describe the tour highlights..."></textarea>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="price">Price (Optional)</label>
                    <input type="text" id="price" name="price" placeholder="e.g., $450">
                </div>
                <div class="form-group">
                    <label for="imageUrl">Featured Image URL</label>
                    <input type="url" id="imageUrl" name="imageUrl" required placeholder="https://...">
                </div>
            </div>

            <button type="submit" id="submitBtn">Generate & Publish to Socials</button>
            <div id="statusBox" class="status-message"></div>
        </form>
    </div>

    <script>
        // Copy the 'Test URL' from your n8n Webhook node and paste it here
        const N8N_WEBHOOK_URL = 'YOUR_N8N_WEBHOOK_URL_HERE';

        document.getElementById('tourForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            
            // Gather form data
            const formData = {
                tourTitle: document.getElementById('tourTitle').value,
                description: document.getElementById('description').value,
                price: document.getElementById('price').value,
                imageUrl: document.getElementById('imageUrl').value
            };

            // Update UI to sending state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Triggering Workflow...';
            statusBox.className = 'status-message'; 
            statusBox.textContent = '';

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        source: 'pearl_heritage_vanilla_js',
                        timestamp: new Date().toISOString(),
                        data: formData
                    })
                });

                if (response.ok) {
                    statusBox.textContent = 'Successfully sent to n8n! Check your workflow.';
                    statusBox.classList.add('status-success');
                    document.getElementById('tourForm').reset(); 
                } else {
                    throw new Error('Network response was not ok');
                }
            } catch (error) {
                console.error('Webhook trigger failed:', error);
                statusBox.textContent = 'Failed to connect to the webhook. Check the console.';
                statusBox.classList.add('status-error');
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate & Publish to Socials';
            }
        });
    </script>

</body>
</html>
